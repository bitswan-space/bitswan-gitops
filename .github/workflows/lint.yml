name: Lint & Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install .[dev]

    - name: Run linter
      run: |
        ruff check app
        ruff format --check

    - name: Run tests (excluding E2E)
      run: pytest tests -v -m "not e2e"
